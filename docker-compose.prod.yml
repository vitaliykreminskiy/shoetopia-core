services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shoetopia
      POSTGRES_USER: shoetopia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoetopia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GHCR_OWNER}/shoetopia-api:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shoetopia:${POSTGRES_PASSWORD}@postgres:5432/shoetopia
      REDIS_URL: redis://redis:6379
      API_SECRET: ${API_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      FLEXOFFERS_API_KEY: ${FLEXOFFERS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/${GHCR_OWNER}/shoetopia-worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shoetopia:${POSTGRES_PASSWORD}@postgres:5432/shoetopia
      REDIS_URL: redis://redis:6379
      FLEXOFFERS_API_KEY: ${FLEXOFFERS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    image: ghcr.io/${GHCR_OWNER}/shoetopia-admin:latest
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      ADMIN_SECRET: ${ADMIN_SECRET}
      API_SECRET: ${API_SECRET}
    depends_on:
      api:
        condition: service_healthy

  cron:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
    environment:
      API_SECRET: ${API_SECRET}
    command: >
      sh -c "echo '45 6 * * * /scripts/daily-sync-cron.sh >> /proc/1/fd/1 2>&1' | crontab -
             crond -f -l 2"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
