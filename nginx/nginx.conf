events { worker_connections 1024; }

http {
  upstream api  { server api:3001; }
  upstream admin { server admin:3002; }

  server {
    listen 80;
    server_name _;

    # Admin & cron API — through the Next admin app (login/logout handlers,
    # session-cookie gate, and Bearer injection before it reaches the API)
    location /api/admin/ {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    location /api/cron/ {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # Public API — open
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # Bull Board — internal only
    location /bull {
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
      proxy_pass http://api;
      proxy_set_header Host $host;
    }

    # Admin UI
    location /admin {
      proxy_pass http://admin;
      proxy_set_header Host $host;
    }

    location /_next/ {
      proxy_pass http://admin;
      proxy_set_header Host $host;
    }
  }
}
